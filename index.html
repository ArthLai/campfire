*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-dark: #2d5016;
  --green: #4a7c28;
  --green-light: #7cb342;
  --green-pale: #e8f5e9;
  --brown: #5d4037;
  --brown-light: #8d6e63;
  --cream: #fefaf3;
  --orange: #ef6c00;
  --orange-light: #fff3e0;
  --text: #333;
  --text-light: #666;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --radius: 16px;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
  background: var(--cream);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

/* Navigation */
.nav {

  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.3s;
}
.nav-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
}
.nav-logo { font-weight: 700; font-size: 16px; color: var(--green-dark); }
.nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
.nav-links a {
  color: var(--text-light); text-decoration: none; font-size: 13px;
  padding: 6px 12px; border-radius: 20px; transition: all 0.2s;
  font-weight: 500;
}
.nav-links a:hover { background: var(--green-pale); color: var(--green-dark); }

/* Hero */
.hero {
  position: relative; height: 100vh; min-height: 600px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.hero-bg {

}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(45,80,22,0.75), rgba(93,64,55,0.65));
}
.hero-content {
  position: relative; text-align: center; color: white; padding: 24px;
}
.hero-date {
  font-size: 14px; letter-spacing: 6px; text-transform: uppercase;
  opacity: 0.9; margin-bottom: 16px; font-weight: 300;
}
.hero-title {
  font-size: clamp(36px, 8vw, 72px); font-weight: 900;
  line-height: 1.2; margin-bottom: 12px;
  text-shadow: 0 4px 30px rgba(0,0,0,0.3);
}
.hero-sub {
  font-size: clamp(16px, 3vw, 22px); font-weight: 300;
  opacity: 0.9; margin-bottom: 36px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
  padding: 10px 24px; border-radius: 50px;
  font-size: 14px; font-weight: 500;
}
.hero-scroll {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  color: white; opacity: 0.7; animation: bounce 2s infinite;
  font-size: 13px; text-align: center;
}
@keyframes bounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* Sections */
.section {
  max-width: 1100px; margin: 0 auto;
  padding: 80px 24px;
}
.section-header {
  text-align: center; margin-bottom: 48px;
}
.section-icon { font-size: 36px; margin-bottom: 12px; }
.section-title {
  font-size: 28px; font-weight: 700; color: var(--green-dark);
  margin-bottom: 8px;
}
.section-desc { color: var(--text-light); font-size: 15px; }

/* Cards */
.card {

  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

/* Members */
.members-grid {

  gap: 16px;
}
.member-card {

}
.member-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.member-avatar {

  font-size: 28px; font-weight: 700; color: white;
  background: linear-gradient(135deg, var(--green), var(--green-light));
  overflow: hidden; position: relative;
}
.member-avatar img { width: 100%; height: 100%; object-fit: cover; }
.member-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.member-group {
  font-size: 11px; padding: 2px 10px; border-radius: 10px;
  display: inline-block; font-weight: 500;
}
.group-a { background: #e3f2fd; color: #1565c0; }
.group-b { background: #fce4ec; color: #c62828; }
.group-c { background: #fff8e1; color: #ef6c00; }
.member-edit-btn {
  position: absolute; top: 8px; right: 8px;
  width: 24px; height: 24px; border-radius: 50%;
  border: none; background: rgba(0,0,0,0.06); cursor: pointer;
  font-size: 12px; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.member-card:hover .member-edit-btn { opacity: 1; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal {
  background: white; border-radius: var(--radius);
  padding: 32px; width: 100%; max-width: 400px;
  box-shadow: var(--shadow-lg);
}
.modal h3 { font-size: 20px; margin-bottom: 20px; color: var(--green-dark); }
.modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-light); }
.modal input[type="text"] {
  width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0;
  border-radius: 10px; font-size: 15px; margin-bottom: 16px;
  font-family: inherit; transition: border-color 0.2s;
}
.modal input[type="text"]:focus { outline: none; border-color: var(--green); }
.modal-avatar-upload {
  width: 100%; padding: 20px; border: 2px dashed #ccc;
  border-radius: 12px; text-align: center; cursor: pointer;

  font-size: 14px; color: var(--text-light);
}
.modal-avatar-upload:hover { border-color: var(--green); }
.modal-actions { display: flex; gap: 10px; margin-top: 8px; }
.btn {

  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.btn-primary { background: var(--green); color: white; flex: 1; }
.btn-primary:hover { background: var(--green-dark); }
.btn-secondary { background: #f5f5f5; color: var(--text); }
.btn-secondary:hover { background: #e0e0e0; }

/* Campsite Info */
.campsite-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .campsite-grid { grid-template-columns: 1fr; } }
.campsite-card {
  background: white; border-radius: var(--radius); padding: 24px;

}
.campsite-card h4 {

.campsite-card p { font-size: 14px; color: var(--text-light); line-height: 1.8; }
.campsite-warning {

  padding: 16px 20px; border-radius: 0 12px 12px 0;
  margin-top: 20px; font-size: 14px;
}
.campsite-warning strong { color: var(--orange); }

/* Timeline */
.timeline { position: relative; padding-left: 32px; }
.timeline::before {
  content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px;
  width: 2px; background: linear-gradient(to bottom, var(--green), var(--green-light));
  border-radius: 1px;
}
.timeline-item { position: relative; margin-bottom: 20px; }
.timeline-dot {
  position: absolute; left: -32px; top: 4px;
  width: 24px; height: 24px; border-radius: 50%;
  background: white; border: 3px solid var(--green);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.timeline-dot.highlight { background: var(--green); border-color: var(--green); }
.timeline-time {

}
.timeline-content {

}
.timeline-content strong { color: var(--brown); }
.timeline-day-label {

.confirm-section {

.confirm-section h4 { font-size: 16px; color: var(--green-dark); margin-bottom: 16px; }
.confirm-grid {

.confirm-chip {

.confirm-chip.confirmed {

.confirm-chip .check { font-size: 14px; }
.confirm-select {

.confirm-select select {

.confirm-select .btn { padding: 8px 20px; }

.packing-tabs {

.packing-tab {
  padding: 10px 28px; border-radius: 50px; border: 2px solid #e0e0e0;

.packing-tab.active {

.packing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.packing-category {

.packing-category h4 {

.packing-item {

.packing-check {
  width: 18px; height: 18px; border-radius: 4px;

/* Footer */
.footer {
  text-align: center; padding: 40px 24px;
  font-size: 13px; color: var(--text-light);
  border-top: 1px solid #e0e0e0;
}
</style>

    { name: '防蚊液' },
    { name: '防曬乳' },
    { name: '手電筒 / 頭燈' },
    { name: '行動電源 + 充電線' },
    { name: '身分證（租車用）' },
  ]},
];

// ─── Helpers ───
function loadState(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveState(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ─── App ───
function App() {
  const [members, setMembers] = useState(() => loadState('camp_members', INITIAL_MEMBERS));
  const [confirmed, setConfirmed] = useState(() => loadState('camp_confirmed', {}));
  const [editMember, setEditMember] = useState(null);
  const [packingChecked, setPackingChecked] = useState(() => loadState('camp_packing', {}));
  const [packingTab, setPackingTab] = useState('group');
  const [confirmSelect, setConfirmSelect] = useState('');

  useEffect(() => saveState('camp_members', members), [members]);
  useEffect(() => saveState('camp_confirmed', confirmed), [confirmed]);
  useEffect(() => saveState('camp_packing', packingChecked), [packingChecked]);

  const groupLabel = g => g === 'A' ? 'A 組（林口）' : g === 'B' ? 'B 組（高鐵站）' : 'C 組（楊梅）';
  const groupClass = g => g === 'A' ? 'group-a' : g === 'B' ? 'group-b' : 'group-c';
  const confirmedCount = Object.values(confirmed).filter(Boolean).length;

  function handleConfirm() {
    if (!confirmSelect) return;
    setConfirmed(prev => ({ ...prev, [confirmSelect]: true }));
    setConfirmSelect('');
  }

  function togglePacking(key) {
    setPackingChecked(prev => ({ ...prev, [key]: !prev[key] }));
  }

  return (
    <>
      {/* Nav */}
      <nav className="nav">
        <div className="nav-inner">
          <div className="nav-logo">⛺ 臻美營地</div>
          <div className="nav-links">
            <a href="#members">成員</a>
            <a href="#campsite">營地</a>
            <a href="#schedule">議程</a>
            <a href="#meeting">集合</a>
            <a href="#packing">物品</a>
          </div>
        </div>
      </nav>

      {/* Hero */}
      <section className="hero">
        <div className="hero-bg" />
        <div className="hero-overlay" />
        <div className="hero-content">
          <div className="hero-date">2026 · 04 · 18 — 19</div>
          <h1 className="hero-title">臻美營地露營</h1>
          <p className="hero-sub">新竹尖石 · 12 人 · 兩天一夜</p>
          <div className="hero-badge">📍 新竹縣尖石鄉 · 海拔 900m</div>
        </div>
        <div className="hero-scroll">
          <div>往下滑動</div>
          <div style={{fontSize:20, marginTop:4}}>↓</div>
        </div>
      </section>

      {/* Members */}
      <section className="section" id="members">
        <div className="section-header">
          <div className="section-icon">👥</div>
          <h2 className="section-title">成員介紹</h2>
          <p className="section-desc">點擊成員卡片可編輯名稱 & 上傳頭像</p>
        </div>
        <div className="members-grid">
          {members.map(m => (
            <div className="member-card" key={m.id} onClick={() => setEditMember(m)}>
              <button className="member-edit-btn">✏️</button>
              <div className="member-avatar" style={m.avatar ? {} : { background: `linear-gradient(135deg, ${m.color}, ${m.color}dd)` }}>
                {m.avatar ? <img src={m.avatar} alt={m.name} /> : m.name[0]}
              </div>
              <div className="member-name">{m.name}</div>
              <span className={`member-group ${groupClass(m.group)}`}>{m.group} 組</span>
            </div>
          ))}
        </div>
      </section>

      {/* Edit Modal */}
      {editMember && (
        <EditModal
          member={editMember}
          onClose={() => setEditMember(null)}
          onSave={(updated) => {
            setMembers(prev => prev.map(m => m.id === updated.id ? updated : m));
            setEditMember(null);
          }}
        />
      )}

      {/* Campsite */}
      <section className="section" id="campsite" style={{background:'white'}}>
        <div style={{maxWidth:1100,margin:'0 auto',padding:'0 24px'}}>
          <div className="section-header">
            <div className="section-icon">🏕️</div>
            <h2 className="section-title">營地介紹</h2>
            <p className="section-desc">臻美營地 · 新竹尖石鄉</p>
          </div>
          <div className="campsite-grid">
            <div className="campsite-card">
              <h4>📍 地址</h4>
              <p>313 新竹縣尖石鄉新樂村煤源段 8 鄰 36-2 號</p>

            </div>
            <div className="campsite-card">
              <h4>🔧 營地設備</h4>
              <p>營地提供：不沾鍋煎烤盤（含夾、勺、鏟）、卡式爐 ×1</p>
              <p style={{marginTop:8}}>其他餐具、調味品需自備。</p>
            </div>
            <div className="campsite-card">
              <h4>🚗 交通路線</h4>
              <p>國道三號關西交流道 → 台三線南下 69km 處左轉往內灣 → 循竹 120 線 → 尖石 → 40.5k 八五山大橋頭前右轉上坡 700m</p>
            </div>
            <div className="campsite-card">
              <h4>⏱ 車程參考</h4>
              <p>家樂福平鎮店 → 營地：約 70-90 分鐘</p>
              <p>（含國三 + 山路，假日內灣段可能塞車）</p>
            </div>
          </div>
          <div className="campsite-warning">
            <strong>⚠️ 注意事項</strong><br />
            Google 導航到八五山大橋附近可能不準，請開慢留意「臻美營地」指標牌。最後 700m 為水泥上坡路段，蠻陡的，低底盤轎車請注意底盤及檔位。
          </div>
        </div>
      </section>

      {/* Schedule */}
      <section className="section" id="schedule">
        <div className="section-header">
          <div className="section-icon">📅</div>
          <h2 className="section-title">露營議程</h2>
          <p className="section-desc">兩天一夜完整時程</p>
        </div>
        <div style={{maxWidth:640, margin:'0 auto'}}>
          <div className="timeline-day-label">DAY 1 — 4/18（六）</div>
          <div className="timeline">
            {SCHEDULE_DAY1.map((s, i) => (
              <div className="timeline-item" key={i}>
                <div className={`timeline-dot ${s.highlight ? 'highlight' : ''}`}>
                  <span>{s.icon}</span>
                </div>
                <div className="timeline-time">{s.time}</div>
                <div className="timeline-content">
                  <strong>{s.title}</strong><br />
                  <span style={{color:'var(--text-light)'}}>{s.desc}</span>
                  {s.thsr && (
                    <div className="thsr-table-wrap">
                      <table className="thsr-table">
                        <thead>
                          <tr><th>車次</th><th>左營發車</th><th>桃園到站</th><th>車程</th></tr>
                        </thead>
                        <tbody>
                          {THSR_TRAINS.map((t, ti) => (
                            <tr key={ti} className={t.recommend ? 'recommend' : ''}>
                              <td style={{fontWeight:600}}>{t.train}</td>
                              <td style={{fontWeight:600}}>{t.dep}</td>
                              <td style={{fontWeight:600}}>{t.arr}</td>
                              <td>{t.duration}</td>
                            </tr>

                      </table>
                      <div style={{marginTop:8, fontSize:11, color:'var(--green-dark)'}}>
                        💡 <strong>建議搭 0810 或 0616</strong>（綠底），10:09-10:18 到桃園可銜接 10:30 集合。0618 車次 10:36 到站會來不及，僅作備案。自由座車廂 8-12 車。
                      </div>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
          <div className="timeline-day-label" style={{marginTop:40}}>DAY 2 — 4/19（日）</div>
          <div className="timeline">
            {SCHEDULE_DAY2.map((s, i) => (
              <div className="timeline-item" key={i}>
                <div className={`timeline-dot ${s.highlight ? 'highlight' : ''}`}>
                  <span>{s.icon}</span>
                </div>
                <div className="timeline-time">{s.time}</div>
                <div className="timeline-content">
                  <strong>{s.title}</strong><br />
                  <span style={{color:'var(--text-light)'}}>{s.desc}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Meeting */}
      <section className="section" id="meeting" style={{background:'white'}}>
        <div style={{maxWidth:1100,margin:'0 auto',padding:'0 24px'}}>
          <div className="section-header">
            <div className="section-icon">🚗</div>
            <h2 className="section-title">集合方式</h2>
            <p className="section-desc">三組分頭出發，家樂福平鎮店全體會合</p>
          </div>

          <div className="meeting-groups">
            <div className="meeting-card group-a-card">
              <h4>🔵 A 組 — 林口出發</h4>
              <div className="route">林口 → 桃園高鐵站接人 → 家樂福平鎮</div>
              <div className="members-list">
                <span>Kathy</span><span>鼎凱</span>
                <span style={{background:'#e3f2fd'}}>+ 接 3 人</span>
              </div>
              <ul className="meeting-steps">
                <li>10:30 Kathy & 鼎凱從林口出發</li>
                <li>11:00 到桃園高鐵站接 3 人（待分配）</li>
                <li>11:10 5 人出發前往家樂福平鎮</li>
                <li>11:30 抵達家樂福</li>
              </ul>
            </div>

            <div className="meeting-card group-b-card">
              <h4>🔴 B 組 — 桃園高鐵站</h4>
              <div className="route">高鐵站集合 + 租車 → 家樂福平鎮</div>
              <div className="members-list">
                <span>Arth</span><span>Mars</span><span>石膏</span><span>Ella</span>
                <span>Emma</span><span>George</span>
                <span style={{background:'#fce4ec'}}>小資 🚄</span>
                <span style={{background:'#fce4ec'}}>傑森 🚄</span>
              </div>
              <ul className="meeting-steps">
                <li>08:25 小資 & 傑森搭 0810 或 08:35 搭 0616 從左營出發（10:09-10:18 到桃園）</li>
                <li>10:30 Arth、Mars、石膏、Ella、Emma、George 在高鐵站集合</li>
                <li>10:30-11:00 辦理租車（9 人座）+ 等小資 & 傑森到站</li>
                <li>11:00 Kathy & 鼎凱到站，3 人上林口車</li>
                <li>11:10 租車載 7 人出發往家樂福</li>
                <li>11:30 抵達家樂福</li>
              </ul>
            </div>

            <div className="meeting-card group-c-card">
              <h4>🟠 C 組 — 楊梅出發</h4>
              <div className="route">楊梅 → 家樂福平鎮</div>
              <div className="members-list">
                <span>菀倩</span><span>Kedens</span>
              </div>
              <ul className="meeting-steps">
                <li>11:10 菀倩 & Kedens 從楊梅出發</li>
                <li>11:30 抵達家樂福</li>
              </ul>
            </div>
          </div>

          {/* Confirmation */}
          <div className="confirm-section">
            <h4>✅ 行程確認（{confirmedCount}/{members.length} 已確認）</h4>
            <div style={{
              height: 6, background: '#eee', borderRadius: 3, marginBottom: 20, overflow: 'hidden'
            }}>
              <div style={{
                height: '100%', width: `${(confirmedCount/members.length)*100}%`,
                background: 'linear-gradient(90deg, var(--green), var(--green-light))',
                borderRadius: 3, transition: 'width 0.5s'
              }} />
            </div>
            <div className="confirm-grid">
              {members.map(m => (
                <div className={`confirm-chip ${confirmed[m.name] ? 'confirmed' : ''}`} key={m.id}>
                  <span className="check">{confirmed[m.name] ? '✅' : '⬜'}</span>
                  {m.name}
                </div>
              ))}
            </div>
            <div className="confirm-select">
              <select value={confirmSelect} onChange={e => setConfirmSelect(e.target.value)}>
                <option value="">選擇你的名字</option>
                {members.filter(m => !confirmed[m.name]).map(m => (
                  <option key={m.id} value={m.name}>{m.name}</option>
                ))}
              </select>
              <button className="btn btn-primary" style={{flex:'none'}} onClick={handleConfirm}>
                我已確認行程 ✓
              </button>
            </div>
          </div>
        </div>
      </section>

      {/* Packing */}
      <section className="section" id="packing">
        <div className="section-header">
          <div className="section-icon">🎒</div>
          <h2 className="section-title">攜帶物品</h2>
          <p className="section-desc">勾選已準備的項目，進度會自動儲存</p>
        </div>
        <div className="packing-tabs">
          <button className={`packing-tab ${packingTab==='group'?'active':''}`} onClick={()=>setPackingTab('group')}>
            📦 團體公用
          </button>
          <button className={`packing-tab ${packingTab==='personal'?'active':''}`} onClick={()=>setPackingTab('personal')}>
            🎒 個人物品
          </button>
        </div>
        <div className="packing-grid">
          {(packingTab === 'group' ? PACKING_GROUP : PACKING_PERSONAL).map((cat, ci) => (
            <div className="packing-category" key={ci}>
              <h4>{cat.icon} {cat.category}</h4>
              {cat.items.map((item, ii) => {
                const key = `${packingTab}-${ci}-${ii}`;
                return (
                  <div className="packing-item" key={ii}>
                    <div
                      className={`packing-check ${packingChecked[key] ? 'checked' : ''}`}
                      onClick={() => togglePacking(key)}
                    >
                      {packingChecked[key] && '✓'}
                    </div>
                    <div>
                      <span style={packingChecked[key] ? {textDecoration:'line-through', opacity:0.5} : {}}>
                        {item.name}
                      </span>
                      {item.note && <span className="note"> — {item.note}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </section>

      {/* Footer */}
      <div className="footer">
        <p>🏕️ 臻美營地露營 2026.04.18-19 — Have Fun!</p>
      </div>
    </>
  );
}

// ─── Edit Modal Component ───
function EditModal({ member, onClose, onSave }) {
  const [name, setName] = useState(member.name);
  const [avatar, setAvatar] = useState(member.avatar);
  const fileRef = useRef();

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setAvatar(ev.target.result);
    reader.readAsDataURL(file);
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>編輯成員資料</h3>
        <label>名稱</label>
        <input type="text" value={name} onChange={e => setName(e.target.value)} />
        <label>頭像</label>
        <input type="file" accept="image/*" ref={fileRef} style={{display:'none'}} onChange={handleFile} />
        <div className="modal-avatar-upload" onClick={() => fileRef.current.click()}>
          {avatar ? (
            <img src={avatar} alt="preview" style={{width:80,height:80,borderRadius:'50%',objectFit:'cover'}} />
          ) : (
            <div>📷 點擊上傳圖片</div>
          )}
        </div>
        <div className="modal-actions">
          <button className="btn btn-secondary" onClick={onClose}>取消</button>
          <button className="btn btn-primary" onClick={() => onSave({...member, name, avatar})}>
            儲存
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
