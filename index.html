// ─── localStorage helpers (fallback) ───
function loadLocal(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveLocal(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ─── App ───
function App() {
  const [members, setMembers] = useState(FALLBACK_MEMBERS);
  const [confirmed, setConfirmed] = useState({});
  const [editMember, setEditMember] = useState(null);
  const [packingChecked, setPackingChecked] = useState(() => loadLocal('camp_packing', {}));
  const [packingTab, setPackingTab] = useState('group');
  const [menuTab, setMenuTab] = useState('dinner');
  const [confirmSelect, setConfirmSelect] = useState('');
  const [packingClaims, setPackingClaims] = useState({});
  const [claimSelect, setClaimSelect] = useState('');
  const [syncStatus, setSyncStatus] = useState('online');
  const [useSupabase, setUseSupabase] = useState(true);

  // Load from Supabase on mount
  useEffect(() => {
    async function loadFromSupabase() {
      try {
        // Load members
        const { data: membersData, error: membersErr } = await supabase
          .from('members')
          .select('*')
          .order('id');

        if (membersErr) throw membersErr;

        if (membersData && membersData.length > 0) {
          setMembers(membersData);
        }

        // Load confirmations
        const { data: confData, error: confErr } = await supabase
          .from('confirmations')
          .select('*');

        if (confErr) throw confErr;

        if (confData) {
          const confMap = {};
          confData.forEach(c => { confMap[c.member_name] = c.confirmed; });
          setConfirmed(confMap);
        }

        // Load packing claims
        const { data: claimsData, error: claimsErr } = await supabase
          .from('packing_claims')
          .select('*');

        if (claimsErr) throw claimsErr;

        if (claimsData) {
          const claimsMap = {};
          claimsData.forEach(c => { claimsMap[c.item_key] = c.claimed_by; });
          setPackingClaims(claimsMap);
        }

        setSyncStatus('online');
      } catch (err) {
        console.warn('Supabase not available, using local fallback:', err.message);
        setUseSupabase(false);
        setSyncStatus('offline');
        // Load from localStorage as fallback
        setMembers(loadLocal('camp_members', FALLBACK_MEMBERS));
        setConfirmed(loadLocal('camp_confirmed', {}));
        const savedClaims = loadLocal('camp_claims', {});
        if (!savedClaims['group-2-12']) savedClaims['group-2-12'] = 'Ella';
        setPackingClaims(savedClaims);
      }
    }

    loadFromSupabase();
  }, []);

  // Save packing & claims to localStorage
  useEffect(() => saveLocal('camp_packing', packingChecked), [packingChecked]);
  useEffect(() => saveLocal('camp_claims', packingClaims), [packingClaims]);

  // Fallback: save to localStorage when Supabase is offline
  useEffect(() => {
    if (!useSupabase) {
      saveLocal('camp_members', members);
      saveLocal('camp_confirmed', confirmed);
    }
  }, [members, confirmed, useSupabase]);

  const groupClass = g => g === 'A' ? 'group-a' : g === 'B' ? 'group-b' : 'group-c';
  const confirmedCount = Object.values(confirmed).filter(Boolean).length;

  async function handleConfirm() {
    if (!confirmSelect) return;
    const newConfirmed = { ...confirmed, [confirmSelect]: true };
    setConfirmed(newConfirmed);

    if (useSupabase) {
      setSyncStatus('saving');
      try {
        await supabase.from('confirmations').upsert({
          member_name: confirmSelect,
          confirmed: true,
          confirmed_at: new Date().toISOString()
        }, { onConflict: 'member_name' });
        setSyncStatus('online');
      } catch {
        setSyncStatus('offline');
      }
    }
    setConfirmSelect('');
  }

  async function handleSaveMember(updated) {
    setMembers(prev => prev.map(m => m.id === updated.id ? updated : m));
    setEditMember(null);

    if (useSupabase) {
      setSyncStatus('saving');
      try {
        const { error } = await supabase.from('members').update({
          name: updated.name,
          bio: updated.bio || '',
          avatar_url: updated.avatar_url,
        }).eq('id', updated.id);

        if (error) throw error;
        setSyncStatus('online');
      } catch (err) {
        console.warn('Failed to save to Supabase:', err.message);
        setSyncStatus('offline');
      }
    }
  }

  function togglePacking(key) {
    setPackingChecked(prev => ({ ...prev, [key]: !prev[key] }));
  }

  async function claimItem(key) {
    if (!claimSelect || packingClaims[key]) return;
    const newClaims = { ...packingClaims, [key]: claimSelect };
    setPackingClaims(newClaims);

    if (useSupabase) {
      setSyncStatus('saving');
      try {
        await supabase.from('packing_claims').upsert({
          item_key: key,
          claimed_by: claimSelect,
          claimed_at: new Date().toISOString(),
        }, { onConflict: 'item_key' });
        setSyncStatus('online');
      } catch { setSyncStatus('offline'); }
    }
  }

  async function unclaimItem(key) {
    setPackingClaims(prev => {
      const next = { ...prev };
      delete next[key];
      return next;
    });

    if (useSupabase) {
      setSyncStatus('saving');
      try {
        await supabase.from('packing_claims').delete().eq('item_key', key);
        setSyncStatus('online');
      } catch { setSyncStatus('offline'); }
    }
  }

  return (
    <>
      {/* Nav */}
      <nav className="nav">
        <div className="nav-inner">
          <div className="nav-logo">⛺ 臻美營地</div>
          <div className="nav-links">
            <a href="#members">成員</a>
            <a href="#campsite">營地</a>
            <a href="#schedule">議程</a>
            <a href="#menu">菜單</a>
            <a href="#meeting">集合</a>
            <a href="#packing">物品</a>
          </div>
        </div>
      </nav>

      {/* Hero */}
      <section className="hero">
        <div className="hero-bg" />
        <div className="hero-overlay" />
        <div className="hero-content">
          <div className="hero-date">2026 · 04 · 18 — 19</div>

// ─── Upload to Supabase Storage ───
async function uploadAvatarToStorage(file, memberId) {
  const fileExt = file.name.split('.').pop();
  const fileName = `member-${memberId}-${Date.now()}.${fileExt}`;
  const filePath = `avatars/${fileName}`;

  const { data, error } = await supabase.storage
    .from('avatars')
    .upload(filePath, file, {
      cacheControl: '3600',
      upsert: true,
    });

  if (error) throw error;

  const { data: urlData } = supabase.storage
    .from('avatars')
    .getPublicUrl(filePath);

  return urlData.publicUrl;
}

// ─── Edit Modal Component ───
function EditModal({ member, onClose, onSave }) {
  const [name, setName] = useState(member.name);
  const [bio, setBio] = useState(member.bio || '');
  const [avatar, setAvatar] = useState(member.avatar_url);
  const [avatarFile, setAvatarFile] = useState(null);
  const [avatarMode, setAvatarMode] = useState('url'); // 'url' or 'file'
  const [avatarUrlInput, setAvatarUrlInput] = useState(member.avatar_url || '');
  const [saving, setSaving] = useState(false);
  const [uploadError, setUploadError] = useState('');
  const fileRef = useRef();

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setAvatarFile(file);
    setUploadError('');
    // Preview locally
    const reader = new FileReader();
    reader.onload = (ev) => setAvatar(ev.target.result);
    reader.readAsDataURL(file);
  }

  function handleUrlChange(e) {
    const url = e.target.value;
    setAvatarUrlInput(url);
    if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
      setAvatar(url);
    }
  }

  async function handleSave() {
    setSaving(true);
    setUploadError('');

    let finalAvatarUrl = avatar;

    // If user selected a local file, try uploading to Supabase Storage
    if (avatarFile && avatarMode === 'file') {
      try {
        finalAvatarUrl = await uploadAvatarToStorage(avatarFile, member.id);
      } catch (err) {
        console.warn('Storage upload failed:', err.message);
        setUploadError('圖片上傳失敗，請改用 URL 方式貼上圖片連結');
        setSaving(false);
        return;
      }
    }

    // If using URL mode, use the URL input
    if (avatarMode === 'url' && avatarUrlInput) {
      finalAvatarUrl = avatarUrlInput;
    }

    await onSave({ ...member, name, bio, avatar_url: finalAvatarUrl });
    setSaving(false);
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>編輯成員資料</h3>
        <label>名稱</label>
        <input type="text" value={name} onChange={e => setName(e.target.value)} />
        <label>簡介</label>
        <textarea
          value={bio}
          onChange={e => setBio(e.target.value)}
          placeholder="寫一段自我介紹吧！例如：興趣、露營經驗、負責項目..."
          rows={3}
        />
        <label>頭像</label>
        {/* Avatar mode tabs */}
        <div style={{display:'flex', gap:6, marginBottom:10}}>
          <button
            type="button"
            className={`btn ${avatarMode === 'url' ? 'btn-primary' : 'btn-secondary'}`}
            style={{padding:'6px 16px', fontSize:12, flex:'none'}}
            onClick={() => setAvatarMode('url')}
          >🔗 貼上網址</button>
          <button
            type="button"
            className={`btn ${avatarMode === 'file' ? 'btn-primary' : 'btn-secondary'}`}
            style={{padding:'6px 16px', fontSize:12, flex:'none'}}
            onClick={() => setAvatarMode('file')}
          >📁 上傳圖片</button>
        </div>

        {avatarMode === 'url' ? (
          <input
            type="text"
            value={avatarUrlInput}
            onChange={handleUrlChange}
            placeholder="貼上圖片網址，如 https://example.com/photo.jpg"
          />
        ) : (
          <>
            <input type="file" accept="image/*" ref={fileRef} style={{display:'none'}} onChange={handleFile} />
            <div className="modal-avatar-upload" onClick={() => fileRef.current.click()}>
              {avatar && !avatar.startsWith('data:') ? (
                <img src={avatar} alt="preview" style={{width:80,height:80,borderRadius:'50%',objectFit:'cover'}} />
              ) : avatarFile ? (
                <img src={avatar} alt="preview" style={{width:80,height:80,borderRadius:'50%',objectFit:'cover'}} />
              ) : (
                <div>📷 點擊上傳圖片<br/><span style={{fontSize:11,opacity:0.6}}>需先在 Supabase 建立 avatars Storage Bucket</span></div>
              )}
            </div>
          </>
        )}

        {uploadError && (
          <div style={{color:'var(--orange)', fontSize:12, marginBottom:10, background:'var(--orange-light)', padding:'8px 12px', borderRadius:8}}>
            ⚠️ {uploadError}
          </div>
        )}

        {/* Preview */}
        {avatar && (
          <div style={{textAlign:'center', marginBottom:12}}>
            <img src={avatar} alt="avatar preview" style={{width:64,height:64,borderRadius:'50%',objectFit:'cover',border:'3px solid var(--green-pale)'}}
              onError={(e) => { e.target.style.display = 'none'; }}
            />
          </div>
        )}

        <div className="modal-actions">
          <button className="btn btn-secondary" onClick={onClose}>取消</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
            {saving ? '儲存中...' : '儲存'}
          </button>
        </div>
      </div>
    </div>
  );
}
